name: Daily Pantry Check
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  check-pantry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - run: pip install requests
      - run: python checker.py
